name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # Convierte el nombre de usuario de GitHub a minúsculas, necesario para ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ba-back

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_VPS }}
          username: ${{ secrets.USERNAME_VPS }}
          password: ${{ secrets.PASSWORD_VPS }}
          # Si prefieres usar llave SSH, descomenta la siguiente línea y elimina/comenta 'password'
          # key: ${{ secrets.SSH_KEY_VPS }}
          port: 22
          script: |
            # Crear directorio del proyecto si no existe
            mkdir -p /root/ba-back
            cd /root/ba-back
            
            # (Opcional) Si tu repo es privado, descomenta las líneas de login a continuación
            # y asegúrate de configurar el secret GH_PAT en GitHub
            # echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # Forzar pull de la última versión
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            
            # Reiniciar contenedor
            docker-compose up -d --build
            
            # Limpiar imágenes viejas que ya no se usan para liberar espacio
            docker image prune -f
